<html lang="en">

  <style>

      border-radius: 48px;

      backdrop-filter: blur(10px);
      transition: 0.3s;
    }

    .auth-container h1 {

      font-weight: 500;
    }

      gap: 12px;

      flex: 1;
      padding: 12px;
      border: none;

      border-radius: 40px;

      cursor: pointer;
      transition: 0.2s;

      color: white;
      box-shadow: 0 6px 14px rgba(241,39,17,0.4);
    }

    .input-group {
      margin-bottom: 18px;
    }

    .input-group label {

      font-size: 0.8rem;

    .gold-btn {
      width: 100%;
      background: linear-gradient(95deg, #f5af19, #f12711);

      border-radius: 40px;
      font-weight: bold;
      font-size: 1.1rem;

      margin-top: 12px;
      transition: 0.2s;
    }

    .gold-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(241,39,17,0.4);
    }

    .message {
      margin-top: 18px;
      padding: 10px;
      border-radius: 32px;
      text-align: center;
      font-size: 0.85rem;
    }

    .error-msg {
      background: #fed7d7;
      color: #c53030;
    }

    .success-msg {
      background: #c6f6d5;
      color: #22543d;
    }

    .hidden {
      display: none;
    }

    /* Game Container */
    .game-container {
      background: linear-gradient(145deg, #1e3a2f, #0f2c22);
      border-radius: 48px;
      padding: 20px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.6);
      max-width: 900px;
      width: 100%;
    }

    .game-header {
      background: linear-gradient(135deg, #2d3748, #1a202c);
      padding: 16px 24px;

      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .player-badge {

      color: white;
      padding: 8px 20px;
      border-radius: 32px;
      font-weight: bold;
    }

    .points-section {
      display: flex;
      gap: 15px;
      align-items: center;

    .points-display {

    .points-btn {

    .points-btn.danger {

    .stats-row {

    .stat {

    }

    .logout-game-btn {
      background: #e53e3e;
      border: none;

      border-radius: 32px;

    }

    canvas {
      display: block;
      margin: 0 auto;
      background: #f7e9c3;
      border-radius: 24px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.4);
      width: 100%;
      height: auto;
      cursor: pointer;
    }

    .game-controls {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .dice-area {
      background: #1f2f28;
      padding: 12px 24px;
      border-radius: 60px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .dice {
      width: 65px;
      height: 65px;
      background: white;

      display: flex;

      font-weight: bold;
      box-shadow: inset 0 0 0 2px #333, 0 8px 16px black;
    }

    .roll-btn {
      background: linear-gradient(95deg, #f5af19, #f12711);
      border: none;
      padding: 12px 28px;
      border-radius: 40px;
      font-weight: bold;
      font-size: 1.2rem;
      cursor: pointer;
      transition: 0.1s linear;
      color: white;
    }

    .turn-indicator {
      background: #f5e6d3;
      padding: 8px 24px;
      border-radius: 32px;

    }

    /* Modal for points */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;

      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 32px;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }

    .modal-content input {
      width: 100%;
      padding: 12px;
      margin: 15px 0;
      border: 2px solid #ddd;
      border-radius: 32px;
      font-size: 1.1rem;
    }

    @media (max-width: 700px) {
      .game-header { flex-direction: column; align-items: stretch; }

<body>

<!-- AUTH SECTION -->
<div id="authSection" class="auth-container">
  <h1>🎲 DREAM LUDO</h1>
  <div class="auth-sub">deposit • play • withdraw winnings</div>
  <div class="tab-bar">
    <button class="tab-btn active" id="authLoginTab">🔐 LOGIN</button>
    <button class="tab-btn" id="authSignupTab">📝 SIGNUP</button>
  </div>

  <div id="loginPanel">
    <div class="input-group"><label>📱 MOBILE NUMBER</label><input type="tel" id="loginMobile" placeholder="9876543210" maxlength="10"></div>
    <div class="input-group"><label>🔒 PASSWORD</label><input type="password" id="loginPassword" placeholder="******"></div>
    <button class="gold-btn" id="doLoginBtn">▶ PLAY & WIN</button>
    <div id="loginMessage" class="message"></div>
  </div>

  <div id="signupPanel" class="hidden">
    <div class="input-group"><label>📞 MOBILE</label><input type="tel" id="signupMobile" placeholder="10 digits" maxlength="10"></div>
    <div class="input-group"><label>👤 FULL NAME</label><input type="text" id="fullName" placeholder="e.g. Rohan"></div>
    <div class="input-group"><label>🏙️ CITY</label><input type="text" id="city" placeholder="Mumbai"></div>
    <div class="input-group"><label>🎂 DATE OF BIRTH</label><input type="date" id="dob"></div>
    <div class="input-group"><label>🔑 PASSWORD (min 6)</label><input type="password" id="signupPassword"></div>
    <button class="gold-btn" id="doSignupBtn">✨ CREATE ACCOUNT</button>
    <div id="signupMessage" class="message"></div>
  </div>
</div>

<!-- GAME SECTION -->
<div id="gameSection" class="game-container" style="display: none;">
  <div class="game-header">
    <div class="player-badge" id="gameUserName">Player</div>
    <div class="points-section">
      <span>💰 POINTS:</span>
      <span class="points-display" id="pointsDisplay">0</span>
      <button class="points-btn" id="depositBtn">+ DEPOSIT</button>
      <button class="points-btn danger" id="withdrawBtn">- WITHDRAW</button>
    </div>
    <div class="stats-row">
      <span class="stat">🏆 Wins: <span id="statWins">0</span></span>
      <span class="stat">🎲 Games: <span id="statGames">0</span></span>
    </div>
    <button class="logout-game-btn" id="gameLogoutBtn">🚪 EXIT</button>
  </div>
  <canvas id="ludoCanvas" width="700" height="700" style="width:100%; height:auto; max-width:700px; aspect-ratio:1/1"></canvas>
  <div class="game-controls">

      <div class="dice" id="diceValue">⚀</div>
      <button class="roll-btn" id="rollDiceBtn">🎲 ROLL DICE</button>

</div>

<!-- Points Modal -->
<div id="pointsModal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle">Deposit Points</h3>
    <input type="number" id="pointsAmount" placeholder="Enter amount" min="1">
    <button class="gold-btn" id="confirmPointsBtn">Confirm</button>
    <button class="gold-btn" id="cancelPointsBtn" style="background:#666; margin-top:10px;">Cancel</button>
  </div>
</div>

<script>
// ----------------------------- FIREBASE CONFIG -----------------------------
const firebaseConfig = {
  apiKey: "AIzaSyCnAr-ljDz_n4ChwHYyk_pGsrLxQ89dJM4",
  authDomain: "dreamludo-37fd0.firebaseapp.com",
  projectId: "dreamludo-37fd0",
  storageBucket: "dreamludo-37fd0.firebasestorage.app",
  messagingSenderId: "552740254342",
  appId: "1:552740254342:web:d99059f5927b9606705707",
  measurementId: "G-BFBYGDZRF3"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentFirebaseUser = null;
let userStats = { wins: 0, games: 0, points: 0 };

// Helper functions
function mobileToEmail(mob) { return `${mob.trim()}@dreamludo.com`; }

function showMsg(el, txt, isErr = true) {
  el.textContent = txt;
  el.className = `message ${isErr ? 'error-msg' : 'success-msg'}`;
  setTimeout(() => { if (el.textContent === txt) { el.textContent = ""; el.className = "message"; } }, 4000);
}

// ---------- AUTH: SIGNUP ----------
async function handleSignup() {
  const mobile = document.getElementById('signupMobile').value.trim();
  const name = document.getElementById('fullName').value.trim();
  const city = document.getElementById('city').value.trim();
  const dob = document.getElementById('dob').value;
  const pwd = document.getElementById('signupPassword').value;
  const msgDiv = document.getElementById('signupMessage');
  
  if (!mobile || !name || !city || !dob || !pwd) return showMsg(msgDiv, "All fields required", true);
  if (!/^\d{10}$/.test(mobile)) return showMsg(msgDiv, "10-digit mobile", true);
  if (pwd.length < 6) return showMsg(msgDiv, "Password min 6 chars", true);
  
  const email = mobileToEmail(mobile);
  try {
    const cred = await auth.createUserWithEmailAndPassword(email, pwd);
    await cred.user.updateProfile({ displayName: name });
    await db.collection('users').doc(cred.user.uid).set({
      mobile, fullName: name, city, dob, 
      gamesPlayed: 0, gamesWon: 0, points: 100, // welcome bonus 100 points
      createdAt: new Date()
    });
    showMsg(msgDiv, "✅ Account created! Welcome bonus 100 points! Please login.", false);
    document.getElementById('signupPanel').reset();
    document.getElementById('authLoginTab').click();
  } catch (err) {
    let er = err.message;
    if (er.includes("email-already-in-use")) er = "Mobile already registered";
    showMsg(msgDiv, "❌ " + er, true);
  }
}

// ---------- AUTH: LOGIN ----------
async function handleLogin() {
  const mobile = document.getElementById('loginMobile').value.trim();
  const pwd = document.getElementById('loginPassword').value;
  const msgDiv = document.getElementById('loginMessage');
  
  if (!mobile || !pwd) return showMsg(msgDiv, "Enter mobile & password", true);
  if (!/^\d{10}$/.test(mobile)) return showMsg(msgDiv, "Invalid mobile", true);
  
  const email = mobileToEmail(mobile);
  try {
    const cred = await auth.signInWithEmailAndPassword(email, pwd);
    await loadGameAfterLogin(cred.user);
  } catch (err) {
    let msg = err.code === 'auth/user-not-found' ? "No account found. Signup first." : "Wrong password";
    showMsg(msgDiv, "❌ " + msg, true);
  }
}

// ---------- LOAD GAME AFTER LOGIN ----------
async function loadGameAfterLogin(user) {
  currentFirebaseUser = user;
  const docRef = await db.collection('users').doc(user.uid).get();
  let data = docRef.exists ? docRef.data() : {};
  
  userStats = {
    wins: data.gamesWon || 0,
    games: data.gamesPlayed || 0,
    points: data.points || 100,
    name: data.fullName || user.displayName || "Player",
    city: data.city || "Ludopia"
  };
  
  document.getElementById('gameUserName').innerHTML = `🎲 ${userStats.name} (${userStats.city})`;
  document.getElementById('statWins').innerText = userStats.wins;
  document.getElementById('statGames').innerText = userStats.games;
  document.getElementById('pointsDisplay').innerText = userStats.points;
  
  document.getElementById('authSection').style.display = 'none';
  document.getElementById('gameSection').style.display = 'block';
  initLudoGame();
}

// ---------- POINTS SYSTEM (Deposit / Withdraw) ----------
let currentModalAction = null;

function openPointsModal(action) {
  currentModalAction = action;
  document.getElementById('modalTitle').innerText = action === 'deposit' ? '💰 Deposit Points' : '💸 Withdraw Points';
  document.getElementById('pointsAmount').value = '';
  document.getElementById('pointsModal').style.display = 'flex';
}

async function confirmPointsTransaction() {
  const amount = parseInt(document.getElementById('pointsAmount').value);
  if (isNaN(amount) || amount <= 0) {
    alert("Please enter a valid amount");
    return;
  }
  
  if (!currentFirebaseUser) return;
  
  if (currentModalAction === 'withdraw' && amount > userStats.points) {
    alert("Insufficient points!");
    return;
  }
  
  const newPoints = currentModalAction === 'deposit' ? userStats.points + amount : userStats.points - amount;
  
  try {
    await db.collection('users').doc(currentFirebaseUser.uid).update({ points: newPoints });
    userStats.points = newPoints;
    document.getElementById('pointsDisplay').innerText = newPoints;
    alert(`${currentModalAction === 'deposit' ? 'Deposited' : 'Withdrawn'} ${amount} points successfully!`);
    document.getElementById('pointsModal').style.display = 'none';
  } catch (err) {
    alert("Transaction failed: " + err.message);
  }
}

// ---------- LOGOUT ----------
async function logoutGame() {
  await auth.signOut();
  currentFirebaseUser = null;
  document.getElementById('authSection').style.display = 'flex';
  document.getElementById('gameSection').style.display = 'none';
  document.getElementById('loginMobile').value = "";
  document.getElementById('loginPassword').value = "";
}

// Update game stats after win
async function updateGameStats(isWinner) {
  if (!currentFirebaseUser) return;
  const uid = currentFirebaseUser.uid;
  const newGames = userStats.games + 1;
  let newWins = userStats.wins;
  let pointsEarned = 0;
  
  if (isWinner) {
    newWins++;
    pointsEarned = 50; // winner gets 50 points
    userStats.points += pointsEarned;
  }
  
  await db.collection('users').doc(uid).update({
    gamesPlayed: newGames,
    gamesWon: newWins,
    points: userStats.points
  }).catch(e => console.warn);
  
  userStats.games = newGames;
  userStats.wins = newWins;
  document.getElementById('statWins').innerText = newWins;
  document.getElementById('statGames').innerText = newGames;
  document.getElementById('pointsDisplay').innerText = userStats.points;
  
  if (isWinner) {
    alert(`🎉 You won! +${pointsEarned} points added!`);
  }
}

// UI Event Listeners
document.getElementById('authLoginTab').onclick = () => {
  document.getElementById('authLoginTab').classList.add('active');
  document.getElementById('authSignupTab').classList.remove('active');
  document.getElementById('loginPanel').classList.remove('hidden');
  document.getElementById('signupPanel').classList.add('hidden');
};
document.getElementById('authSignupTab').onclick = () => {
  document.getElementById('authSignupTab').classList.add('active');
  document.getElementById('authLoginTab').classList.remove('active');
  document.getElementById('signupPanel').classList.remove('hidden');
  document.getElementById('loginPanel').classList.add('hidden');
};
document.getElementById('doLoginBtn').onclick = handleLogin;
document.getElementById('doSignupBtn').onclick = handleSignup;
document.getElementById('gameLogoutBtn').onclick = logoutGame;
document.getElementById('depositBtn').onclick = () => openPointsModal('deposit');
document.getElementById('withdrawBtn').onclick = () => openPointsModal('withdraw');
document.getElementById('confirmPointsBtn').onclick = confirmPointsTransaction;
document.getElementById('cancelPointsBtn').onclick = () => document.getElementById('pointsModal').style.display = 'none';

// Mobile input restriction
document.querySelectorAll('input[type="tel"]').forEach(inp => inp.addEventListener('input', function() { this.value = this.value.replace(/\D/g, '').slice(0, 10); }));

// Continue to Part 3 for Ludo Game Engine
// ----------------------------- LUDO GAME ENGINE -----------------------------
let canvas, ctx;
let boardState = [];
let turn = 0;
let diceValue = 0;
let gameActive = true;
let winnerDeclared = false;
let canRoll = true;
let selectedPiece = null;

const colors = ['#e63946', '#2ecc71', '#f1c40f', '#3498db'];
const colorNames = ['🔴 RED', '🟢 GREEN', '🟡 YELLOW', '🔵 BLUE'];
const startPositions = [0, 13, 26, 39];

function initLudoGame() {
  canvas = document.getElementById('ludoCanvas');
  ctx = canvas.getContext('2d');
  boardState = [];
  for (let c = 0; c < 4; c++) {
    boardState[c] = [-1, -1, -1, -1];
  }
  turn = 0;
  diceValue = 0;
  gameActive = true;
  winnerDeclared = false;
  canRoll = true;
  selectedPiece = null;
  document.getElementById('turnText').innerHTML = `${colorNames[0]}'s Turn`;
  document.getElementById('diceValue').innerHTML = '⚀';
  drawBoard();
  attachGameEvents();
}

function getDiceSymbol(val) {
  const map = ['⚀', '⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
  return map[val] || '⚀';
}

function rollDice() {
  if (!gameActive || winnerDeclared) return;
  if (!canRoll) { alert("Wait! Move a piece first."); return; }
  const dice = Math.floor(Math.random() * 6) + 1;
  diceValue = dice;
  document.getElementById('diceValue').innerHTML = getDiceSymbol(dice);
  canRoll = false;
  let hasMoves = checkAnyMove(turn, dice);
  if (!hasMoves) {
    if (dice !== 6) changeTurn();
    else changeTurn();
    canRoll = true;
  }
  drawBoard();
}

function checkAnyMove(color, dice) {
  for (let i = 0; i < 4; i++) {
    let pos = boardState[color][i];
    if (pos === -1 && dice === 6) return true;
    if (pos >= 0 && pos < 52) {
      let newPos = pos + dice;
      if (newPos <= 51) return true;
      else if (newPos >= 52 && newPos <= 57) return true;
    }
  }
  return false;
}

function tryMovePiece(color, pieceIdx) {
  let pos = boardState[color][pieceIdx];
  let dice = diceValue;
  
  if (pos === -1 && dice === 6) {
    let startCell = startPositions[color];
    if (isCellOccupiedByOpponent(startCell, color)) return false;
    boardState[color][pieceIdx] = startCell;
    afterMove(color, dice);
    return true;
  } else if (pos >= 0 && pos < 52) {
    let newPos = pos + dice;
    if (newPos <= 51) {
      if (isCellOccupiedByOpponent(newPos, color)) {
        let oppColor = getPieceColorAt(newPos);
        if (oppColor !== -1) killPiece(oppColor, newPos);
      }
      boardState[color][pieceIdx] = newPos;
      afterMove(color, dice);
      return true;
    } else if (newPos >= 52 && newPos <= 57) {
      boardState[color][pieceIdx] = 52 + (newPos - 52);
      afterMove(color, dice);
      return true;
    }
  }
  return false;
}

function killPiece(color, cell) {
  for (let i = 0; i < 4; i++) if (boardState[color][i] === cell) boardState[color][i] = -1;
}

function getPieceColorAt(cell) {
  for (let c = 0; c < 4; c++) for (let p = 0; p < 4; p++) if (boardState[c][p] === cell) return c;
  return -1;
}

function isCellOccupiedByOpponent(cell, myColor) {
  let occ = getPieceColorAt(cell);
  return occ !== -1 && occ !== myColor;
}

function afterMove(color, dice) {
  drawBoard();
  let allHome = true;
  for (let i = 0; i < 4; i++) {
    let p = boardState[color][i];
    if (!(p >= 52 && p <= 57)) allHome = false;
  }
  if (allHome && !winnerDeclared) {
    winnerDeclared = true;
    gameActive = false;
    alert(`🏆 ${colorNames[color]} WINS THE GAME! 🏆\n+50 points added!`);
    updateGameStats(true);
    return;
  }
  if (dice === 6) {
    canRoll = true;
    drawBoard();
  } else {
    changeTurn();
  }
  drawBoard();
}

function changeTurn() {
  turn = (turn + 1) % 4;
  canRoll = true;
  selectedPiece = null;
  document.getElementById('turnText').innerHTML = `${colorNames[turn]}'s Turn`;
  drawBoard();
}

function drawBoard() {
  if (!canvas || !ctx) return;
  const size = 700;
  canvas.width = size;
  canvas.height = size;
  ctx.clearRect(0, 0, size, size);
  ctx.fillStyle = '#f7e9c3';
  ctx.fillRect(0, 0, size, size);
  
  // Draw paths
  ctx.lineWidth = 3;
  ctx.strokeStyle = '#b87333';
  for (let i = 0; i < 4; i++) for (let j = 0; j < 4; j++) ctx.strokeRect(i * 175, j * 175, 175, 175);
  
  // Home triangles
  ctx.fillStyle = colors[0]; ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(175, 0); ctx.lineTo(0, 175); ctx.fill();
  ctx.fillStyle = colors[1]; ctx.beginPath(); ctx.moveTo(525, 0); ctx.lineTo(700, 0); ctx.lineTo(700, 175); ctx.fill();
  ctx.fillStyle = colors[2]; ctx.beginPath(); ctx.moveTo(525, 525); ctx.lineTo(700, 525); ctx.lineTo(700, 700); ctx.fill();
  ctx.fillStyle = colors[3]; ctx.beginPath(); ctx.moveTo(0, 525); ctx.lineTo(0, 700); ctx.lineTo(175, 700); ctx.fill();
  
  // Draw pieces
  for (let c = 0; c < 4; c++) {
    for (let p = 0; p < 4; p++) {
      let pos = boardState[c][p];
      let x, y;
      if (pos === -1) {
        let homeX = (c === 0 ? 30 : c === 1 ? 530 : c === 2 ? 530 : 30);
        let homeY = (c === 0 ? 30 : c === 1 ? 30 : c === 2 ? 530 : 530);
        let off = (p * 35);
        x = homeX + (c % 2 === 0 ? off % 100 : off % 100);
        y = homeY + Math.floor(off / 100) * 35;
      } else if (pos >= 0 && pos <= 51) {
        let cell = pos;
        let section = Math.floor(cell / 13);
        let idx = cell % 13;
        if (section === 0) { x = 150 + idx * 30; y = 350; }
        else if (section === 1) { x = 500; y = 150 + idx * 30; }
        else if (section === 2) { x = 500 - idx * 30; y = 500; }
        else { x = 150; y = 500 - idx * 30; }
        x = Math.min(650, Math.max(20, x));
        y = Math.min(650, Math.max(20, y));
      } else if (pos >= 52 && pos <= 57) {
        let step = pos - 52;
        let cx = (c === 0 ? 250 : c === 1 ? 450 : c === 2 ? 450 : 250);
        let cy = (c === 0 ? 250 : c === 1 ? 250 : c === 2 ? 450 : 450);
        x = cx + (step % 3) * 35;
        y = cy + Math.floor(step / 3) * 35;
      } else continue;
      
      ctx.beginPath();
      ctx.arc(x, y, 18, 0, 2 * Math.PI);
      ctx.fillStyle = colors[c];
      ctx.fill();
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = 'white';
      ctx.font = 'bold 20px sans-serif';
      ctx.fillText(p + 1, x - 8, y + 8);
    }
  }
  
  // Highlight selected piece
  if (selectedPiece && gameActive && !winnerDeclared) {
    let [sc, sp] = [selectedPiece.color, selectedPiece.pieceIdx];
    let pos = boardState[sc][sp];
    let x = 0, y = 0;
    if (pos === -1) {
      let off = (sp * 35);
      x = (sc === 0 ? 30 : sc === 1 ? 530 : sc === 2 ? 530 : 30) + (sc % 2 === 0 ? off % 100 : off % 100);
      y = (sc === 0 ? 30 : sc === 1 ? 30 : sc === 2 ? 530 : 530) + Math.floor(off / 100) * 35;
    } else if (pos >= 0 && pos <= 51) {
      let cell = pos, section = Math.floor(cell / 13), idx = cell % 13;
      if (section === 0) { x = 150 + idx * 30; y = 350; }
      else if (section === 1) { x = 500; y = 150 + idx * 30; }
      else if (section === 2) { x = 500 - idx * 30; y = 500; }
      else { x = 150; y = 500 - idx * 30; }
    } else {
      let step = pos - 52;
      let cx = (sc === 0 ? 250 : sc === 1 ? 450 : sc === 2 ? 450 : 250);
      let cy = (sc === 0 ? 250 : sc === 1 ? 250 : sc === 2 ? 450 : 450);
      x = cx + (step % 3) * 35;
      y = cy + Math.floor(step / 3) * 35;
    }
    ctx.save();
    ctx.shadowBlur = 12;
    ctx.shadowColor = 'gold';
    ctx.beginPath();
    ctx.arc(x, y, 24, 0, 2 * Math.PI);
    ctx.strokeStyle = 'gold';
    ctx.lineWidth = 4;
    ctx.stroke();
    ctx.restore();
  }
}

function handleCanvasClick(e) {
  if (!gameActive || winnerDeclared) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  let mouseX = (e.clientX - rect.left) * scaleX;
  let mouseY = (e.clientY - rect.top) * scaleY;
  
  for (let c = 0; c < 4; c++) {
    if (c !== turn) continue;
    for (let p = 0; p < 4; p++) {
      let pos = boardState[c][p];
      let x = 0, y = 0;
      if (pos === -1) {
        let off = (p * 35);
        x = (c === 0 ? 30 : c === 1 ? 530 : c === 2 ? 530 : 30) + (c % 2 === 0 ? off % 100 : off % 100);
        y = (c === 0 ? 30 : c === 1 ? 30 : c === 2 ? 530 : 530) + Math.floor(off / 100) * 35;
      } else if (pos >= 0 && pos <= 51) {
        let cell = pos, section = Math.floor(cell / 13), idx = cell % 13;
        if (section === 0) { x = 150 + idx * 30; y = 350; }
        else if (section === 1) { x = 500; y = 150 + idx * 30; }
        else if (section === 2) { x = 500 - idx * 30; y = 500; }
        else { x = 150; y = 500 - idx * 30; }
      } else if (pos >= 52 && pos <= 57) {
        let step = pos - 52;
        let cx = (c === 0 ? 250 : c === 1 ? 450 : c === 2 ? 450 : 250);
        let cy = (c === 0 ? 250 : c === 1 ? 250 : c === 2 ? 450 : 450);
        x = cx + (step % 3) * 35;
        y = cy + Math.floor(step / 3) * 35;
      } else continue;
      
      let dx = mouseX - x, dy = mouseY - y;
      if (Math.hypot(dx, dy) < 22) {
        if (selectedPiece && selectedPiece.color === c && selectedPiece.pieceIdx === p) {
          if (tryMovePiece(c, p)) { selectedPiece = null; drawBoard(); return; }
        } else {
          if (canRoll === false && diceValue > 0 && checkAnyMove(c, diceValue)) {
            selectedPiece = { color: c, pieceIdx: p };
            drawBoard();
          } else if (canRoll === true) { alert("Roll dice first!"); }
        }
        return;
      }
    }
  }
}

function attachGameEvents() {
  canvas.addEventListener('click', handleCanvasClick);
  document.getElementById('rollDiceBtn').onclick = () => { if (gameActive && !winnerDeclared) rollDice(); };
}

// Check auth state on load
auth.onAuthStateChanged(async (user) => {
  if (user) {
    await loadGameAfterLogin(user);
  }
});
</script>
