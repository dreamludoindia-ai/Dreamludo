<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DreamLudo • Complete Firebase Setup</title>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a472a 0%, #0a2f1f 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      width: 100%;
      background: rgba(255,255,255,0.95);
      border-radius: 30px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    h1 {
      text-align: center;
      color: #ff6b35;
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
    }

    .tab {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }

    .tab button {
      flex: 1;
      padding: 12px;
      border: none;
      background: #f0f0f0;
      border-radius: 25px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      transition: 0.3s;
    }

    .tab button.active {
      background: #ff6b35;
      color: white;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 25px;
      font-size: 16px;
      transition: 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #ff6b35;
    }

    button[type="submit"] {
      width: 100%;
      padding: 14px;
      background: #ff6b35;
      color: white;
      border: none;
      border-radius: 25px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button[type="submit"]:hover {
      background: #e55a2b;
      transform: translateY(-2px);
    }

    .message {
      margin-top: 20px;
      padding: 12px;
      border-radius: 25px;
      text-align: center;
      font-size: 14px;
    }

    .error {
      background: #ffe0e0;
      color: #d63031;
    }

    .success {
      background: #d4edda;
      color: #155724;
    }

    .hidden {
      display: none;
    }

    .setup-guide {
      background: #fff3e0;
      padding: 15px;
      border-radius: 15px;
      margin-top: 20px;
      font-size: 12px;
      color: #856404;
    }

    .setup-guide h4 {
      margin-bottom: 8px;
      color: #ff6b35;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🎲 DREAM LUDO</h1>
  <div class="subtitle">Sign in to start playing</div>

  <div class="tab">
    <button id="loginTab" class="active">🔐 Login</button>
    <button id="signupTab">📝 Create Account</button>
  </div>

  <!-- Login Form -->
  <div id="loginForm">
    <form id="loginFormElement">
      <div class="form-group">
        <label>📱 Mobile Number</label>
        <input type="tel" id="loginMobile" placeholder="9876543210" maxlength="10" required>
      </div>
      <div class="form-group">
        <label>🔒 Password</label>
        <input type="password" id="loginPassword" placeholder="Enter password" required>
      </div>
      <button type="submit">Login & Play</button>
      <div id="loginMessage" class="message"></div>
    </form>
  </div>

  <!-- Signup Form -->
  <div id="signupForm" class="hidden">
    <form id="signupFormElement">
      <div class="form-group">
        <label>📱 Mobile Number</label>
        <input type="tel" id="signupMobile" placeholder="9876543210" maxlength="10" required>
      </div>
      <div class="form-group">
        <label>👤 Full Name</label>
        <input type="text" id="fullName" placeholder="John Doe" required>
      </div>
      <div class="form-group">
        <label>🏙️ City</label>
        <input type="text" id="city" placeholder="Mumbai" required>
      </div>
      <div class="form-group">
        <label>🎂 Date of Birth</label>
        <input type="date" id="dob" required>
      </div>
      <div class="form-group">
        <label>🔑 Password (min 6 characters)</label>
        <input type="password" id="signupPassword" minlength="6" required>
      </div>
      <button type="submit">Create Account</button>
      <div id="signupMessage" class="message"></div>
    </form>
  </div>

  <!-- Setup Guide (visible only if Firebase not configured) -->
  <div id="setupGuide" class="setup-guide" style="display: none;">
    <h4>⚙️ Firebase Setup Required</h4>
    <p>1. Go to <a href="https://console.firebase.google.com" target="_blank">Firebase Console</a><br>
    2. Select project: <strong>dreamludo-37fd0</strong><br>
    3. Enable <strong>Email/Password</strong> authentication<br>
    4. Create Firestore Database in <strong>Test Mode</strong><br>
    5. Refresh this page</p>
  </div>
</div>

<script>
  // Your Firebase Config
  const firebaseConfig = {
    apiKey: "AIzaSyCnAr-ljDz_n4ChwHYyk_pGsrLxQ89dJM4",
    authDomain: "dreamludo-37fd0.firebaseapp.com",
    projectId: "dreamludo-37fd0",
    storageBucket: "dreamludo-37fd0.firebasestorage.app",
    messagingSenderId: "552740254342",
    appId: "1:552740254342:web:d99059f5927b9606705707",
    measurementId: "G-BFBYGDZRF3"
  };

  // Initialize Firebase
  let auth, db;
  let firebaseInitialized = false;

  try {
    firebase.initializeApp(firebaseConfig);
    auth = firebase.auth();
    db = firebase.firestore();
    firebaseInitialized = true;
    console.log("✅ Firebase connected!");
  } catch (error) {
    console.error("Firebase init error:", error);
    document.getElementById('setupGuide').style.display = 'block';
  }

  // Helper functions
  function showMessage(element, text, isError = true) {
    element.textContent = text;
    element.className = `message ${isError ? 'error' : 'success'}`;
    setTimeout(() => {
      element.textContent = '';
      element.className = 'message';
    }, 5000);
  }

  function mobileToEmail(mobile) {
    return `${mobile}@dreamludo.com`;
  }

  // Signup Function
  async function signup(event) {
    event.preventDefault();
    if (!firebaseInitialized) {
      showMessage(document.getElementById('signupMessage'), '⚠️ Firebase not configured. Check setup guide!', true);
      return;
    }

    const mobile = document.getElementById('signupMobile').value.trim();
    const name = document.getElementById('fullName').value.trim();
    const city = document.getElementById('city').value.trim();
    const dob = document.getElementById('dob').value;
    const password = document.getElementById('signupPassword').value;

    // Validation
    if (!mobile || !name || !city || !dob || !password) {
      showMessage(document.getElementById('signupMessage'), '❌ Please fill all fields', true);
      return;
    }
    if (!/^\d{10}$/.test(mobile)) {
      showMessage(document.getElementById('signupMessage'), '❌ Mobile must be 10 digits', true);
      return;
    }
    if (password.length < 6) {
      showMessage(document.getElementById('signupMessage'), '❌ Password must be at least 6 characters', true);
      return;
    }

    const email = mobileToEmail(mobile);
    const signupMsg = document.getElementById('signupMessage');

    try {
      showMessage(signupMsg, 'Creating account...', false);
      
      // Create user in Firebase Auth
      const userCredential = await auth.createUserWithEmailAndPassword(email, password);
      const user = userCredential.user;
      
      // Update display name
      await user.updateProfile({ displayName: name });
      
      // Save additional data to Firestore
      await db.collection('users').doc(user.uid).set({
        mobile: mobile,
        fullName: name,
        city: city,
        dateOfBirth: dob,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        email: email
      });
      
      showMessage(signupMsg, '✅ Account created successfully! Please login.', false);
      
      // Clear form and switch to login
      document.getElementById('signupFormElement').reset();
      setTimeout(() => {
        document.getElementById('loginTab').click();
      }, 1500);
      
    } catch (error) {
      console.error('Signup error:', error);
      let errorMsg = '❌ ';
      if (error.code === 'auth/email-already-in-use') {
        errorMsg += 'This mobile number is already registered!';
      } else if (error.code === 'auth/weak-password') {
        errorMsg += 'Password is too weak!';
      } else {
        errorMsg += error.message;
      }
      showMessage(signupMsg, errorMsg, true);
    }
  }

  // Login Function
  async function login(event) {
    event.preventDefault();
    if (!firebaseInitialized) {
      showMessage(document.getElementById('loginMessage'), '⚠️ Firebase not configured. Check setup guide!', true);
      return;
    }

    const mobile = document.getElementById('loginMobile').value.trim();
    const password = document.getElementById('loginPassword').value;
    const loginMsg = document.getElementById('loginMessage');

    if (!mobile || !password) {
      showMessage(loginMsg, '❌ Please enter mobile and password', true);
      return;
    }
    if (!/^\d{10}$/.test(mobile)) {
      showMessage(loginMsg, '❌ Mobile must be 10 digits', true);
      return;
    }

    const email = mobileToEmail(mobile);

    try {
      showMessage(loginMsg, 'Logging in...', false);
      const userCredential = await auth.signInWithEmailAndPassword(email, password);
      const user = userCredential.user;
      
      // Get user details from Firestore
      const userDoc = await db.collection('users').doc(user.uid).get();
      let userName = user.displayName || 'Player';
      if (userDoc.exists) {
        userName = userDoc.data().fullName || userName;
      }
      
      showMessage(loginMsg, `🎉 Welcome back, ${userName}! Entering DreamLudo...`, false);
      
      // Clear form
      document.getElementById('loginFormElement').reset();
      
      // Simulate game launch
      setTimeout(() => {
        alert(`✨ DREAM LUDO LOBBY ✨\nWelcome ${userName}!\nGet ready to roll the dice! 🎲`);
      }, 500);
      
    } catch (error) {
      console.error('Login error:', error);
      let errorMsg = '❌ ';
      if (error.code === 'auth/user-not-found') {
        errorMsg += 'Account not found. Please sign up first!';
      } else if (error.code === 'auth/wrong-password') {
        errorMsg += 'Wrong password!';
      } else {
        errorMsg += error.message;
      }
      showMessage(loginMsg, errorMsg, true);
    }
  }

  // Tab switching
  document.getElementById('loginTab').addEventListener('click', () => {
    document.getElementById('loginTab').classList.add('active');
    document.getElementById('signupTab').classList.remove('active');
    document.getElementById('loginForm').classList.remove('hidden');
    document.getElementById('signupForm').classList.add('hidden');
  });
  
  document.getElementById('signupTab').addEventListener('click', () => {
    document.getElementById('signupTab').classList.add('active');
    document.getElementById('loginTab').classList.remove('active');
    document.getElementById('signupForm').classList.remove('hidden');
    document.getElementById('loginForm').classList.add('hidden');
  });

  // Form submissions
  document.getElementById('signupFormElement').addEventListener('submit', signup);
  document.getElementById('loginFormElement').addEventListener('submit', login);

  // Mobile input restriction
  document.querySelectorAll('input[type="tel"]').forEach(input => {
    input.addEventListener('input', function(e) {
      this.value = this.value.replace(/\D/g, '').slice(0, 10);
    });
  });
</script>
</body>
</html>
